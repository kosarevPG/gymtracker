name: Deploy Backend to Yandex Cloud Function

on:
  push:
    branches:
      - main
    paths:
      - 'back/**'
      - '.github/workflows/deploy-yandex.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check credentials
        id: creds
        run: |
          MISSING=""
          [ -z "${{ secrets.YC_SA_JSON_CREDENTIALS }}" ] && MISSING="${MISSING}YC_SA_JSON_CREDENTIALS "
          [ -z "${{ secrets.YC_BUCKET }}" ] && MISSING="${MISSING}YC_BUCKET "
          [ -z "${{ secrets.YC_FOLDER_ID }}" ] && MISSING="${MISSING}YC_FOLDER_ID "
          [ -z "${{ secrets.YDB_ENDPOINT }}" ] && MISSING="${MISSING}YDB_ENDPOINT "
          [ -z "${{ secrets.YDB_DATABASE }}" ] && MISSING="${MISSING}YDB_DATABASE "
          [ -z "${{ secrets.AUTH_TOKEN }}" ] && MISSING="${MISSING}AUTH_TOKEN "
          if [ -z "${{ secrets.YC_SA_JSON_CREDENTIALS }}" ]; then
            echo "has_creds=false" >> $GITHUB_OUTPUT
            echo "::warning::Секреты не настроены. Добавьте в Settings → Secrets and variables → Actions: $MISSING. См. docs/DEPLOY_YANDEX.md"
          else
            echo "has_creds=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Yandex Cloud Function
        id: deploy
        if: steps.creds.outputs.has_creds == 'true'
        uses: yc-actions/yc-sls-function@v4
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          bucket: ${{ secrets.YC_BUCKET }}
          folder-id: ${{ secrets.YC_FOLDER_ID }}
          function-name: ${{ secrets.YC_FUNCTION_NAME || 'gymtracker-api' }}
          runtime: python312
          entrypoint: index.handler
          memory: 512Mb
          execution-timeout: 120
          source-root: back
          environment: |
            YDB_ENDPOINT=${{ secrets.YDB_ENDPOINT }}
            YDB_DATABASE=${{ secrets.YDB_DATABASE }}
            AUTH_TOKEN=${{ secrets.AUTH_TOKEN }}
